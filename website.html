<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Walletera - Payment As A Service Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: "Inter", Arial, sans-serif;
            background: #fff;
            color: #222;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 420px;
            padding: 2em 1.5em;
            border-radius: 10px;
            background: #fafafa;
            box-shadow: 0 3px 14px rgba(0,0,0,0.06);
            text-align: center;
        }
        h1 {
            font-size: 2em;
            font-weight: 600;
            margin-bottom: 0.3em;
            letter-spacing: -1px;
        }
        p {
            font-size: 1.15em;
            color: #666;
            margin-bottom: 2em;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1em;
        }
        .button-link {
            display: flex;
            align-items: center;
            justify-content: start;
            color: #fff;
            background: #1281ff;
            text-decoration: none;
            font-weight: 500;
            padding: 0.75em 1.25em;
            border-radius: 6px;
            border: none;
            transition: background 0.18s;
            font-size: 1em;
            box-shadow: 0 2px 8px rgba(18, 129, 255, 0.06);
            gap: 0.7em;
        }
        .button-link svg {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: block;
        }
        .button-link:hover {
            background: #0059ba;
        }
        @media (max-width: 500px) {
            .container {
                max-width: 96vw;
                padding: 1.2em 0.4em;
            }
            .links {
                gap: 0.7em;
            }
            .button-link {
                font-size: 0.97em;
                padding: 0.63em 0.85em;
            }
        }
    </style>
</head>

<div class="container">

    <p>

    </p>
