<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Walletera - Payment As A Service Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: "Inter", Arial, sans-serif;
            background: #fff;
            color: #222;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 520px;
            padding: 3em 1.5em;
            border-radius: 16px;
            background: #fafafa;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            text-align: center;
        }
        h1 {
            font-size: 2.8em;
            font-weight: 700;
            margin-bottom: 0.5em;
            letter-spacing: -1.5px;
        }
        p {
            font-size: 1.45em;
            color: #555;
            margin-bottom: 2.4em;
        }
        .links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.4em;
            width: 100%;
        }
        .plain-link {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            gap: 1em;
            color: #222;
            font-weight: 600;
            font-size: 1.23em;
            text-decoration: none;
            transition: color 0.17s;
            width: 100%;
            max-width: 410px;
        }
        .plain-link:hover {
            color: #1281ff;
        }
        .icon-wrap {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .plain-link svg {
            width: 38px;
            height: 38px;
            display: block;
        }
        .link-text {
            text-align: left;
            line-height: 1.32;
        }
        @media (max-width: 600px) {
            .container {
                max-width: 98vw;
                padding: 1.2em 0.4em;
            }
            h1 {
                font-size: 2em;
            }
            p,
            .plain-link {
                font-size: 1.02em;
            }
            .icon-wrap {
                width: 30px;
                height: 30px;
            }
            .plain-link svg {
                width: 22px;
                height: 22px;
            }
            .plain-link {
                max-width: 99vw;
            }
        }
    </style>
</head>
