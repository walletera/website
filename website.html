<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Walletera - Payments as a Service Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg,#e3f0ff 0%,#f6fbff 100%);
            color: #1a2533;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 440px;
            padding: 3em 2em 2.2em 2em;
            border-radius: 20px;
            background: none;
            box-shadow: 0 8px 32px 0 rgba(52, 97, 191, 0.12), 0 1.5px 2px 0 rgba(70, 130, 180, 0.06);
            text-align: center;
            border: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: 6vh auto;

        }
        @media (max-width: 600px) {
            .container {
                max-width: 97vw;
                padding: 1em 0.3em 1.2em 0.3em;
            }
        }
        h1 {
            font-size: 2.4em;
            font-weight: 700;
            color: #204689;
            letter-spacing: -1.2px;
            margin-bottom: 0.38em;
        }
        p {
            font-size: 1.23em;
            color: #4d627b;
            margin-bottom: 2.2em;
            font-weight: 400;
            line-height: 1.4;
        }
        .links-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.2em;
            justify-content: center;
            align-items: stretch;
            margin: 0 auto;
            width: 100%;
        }
        .grid-link {
            display: grid;
            grid-template-columns: 52px 1fr;
            align-items: center;
            gap: 0 1em;
            background: linear-gradient(90deg, #e3edff 0%, #f7fbfe 100%);
            border-radius: 15px;
            box-shadow: 0 2px 8px 0 rgba(36, 79, 190, 0.07);
            padding: 0.6em 1.2em;
            text-decoration: none;
            transition: box-shadow 0.18s, transform 0.18s, background 0.21s;
            position: relative;
            min-height: 56px;
            border: 1.5px solid #e0e6ef;
        }
        .grid-link:hover,
        .grid-link:focus {
            background: linear-gradient(90deg, #e1edff 0%, #d8e9ff 100%);
            box-shadow: 0 8px 24px 0 rgba(52, 120, 205, 0.12);
            transform: translateY(-2px) scale(1.025);
            border-color: #bdd4fd;
        }
        .icon-wrap {
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eaf3fc;
            border-radius: 50%;
            border: 1px solid #d6e6fa;
            transition: background 0.18s, border 0.18s;
        }
        .grid-link:hover .icon-wrap {
            background: #ddeafb;
            border-color: #adc7ee;
        }
        .links-grid svg {
            width: 27px;
            height: 27px;
            display: block;
        }
        .link-text {
            color: #253659;
            font-weight: 600;
            font-size: 1.14em;
            text-decoration: none;
            transition: color 0.18s;
            text-align: left;
            line-height: 1.32;
            border-radius: 6px;
            width: 100%;
            display: inline-block;
        }
        .grid-link:hover .link-text,
        .grid-link:focus .link-text {
            color: #1351c9;
        }
        @media (max-width: 600px) {
            .container {
                max-width: 97vw;
                padding: 1em 0.3em 1.2em 0.3em;
            }
            h1 {
                font-size: 1.4em;
            }
            p,
            .link-text {
                font-size: 1em;
            }
            .grid-link {
                grid-template-columns: 34px 1fr;
                padding: 0.5em 0.7em;
            }
            .icon-wrap {
                width: 34px;
                height: 34px;
            }
            .links-grid svg {
                width: 18px;
                height: 18px;
            }
        }
        /* Fade-in animation */
        .container {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.92s cubic-bezier(.43,.65,.34,1.07) 0.08s forwards;
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: none;
            }
        }

        /* SVG background illustration: sun, more yellow, green hill */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: url('data:image/svg+xml;utf8,<svg width="1000" height="600" viewBox="0 0 1000 600" fill="none" xmlns="http://www.w3.org/2000/svg"><!-- Top right: lighter sun & glow --><circle cx="900" cy="100" r="70" fill="yellow" fill-opacity="0.40"/><radialGradient id="b" cx="0.92" cy="0.08" r="0.27" fx="0.95" fy="0.08"><stop offset="0%" stop-color="yellow" stop-opacity="0.14"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient><rect x="780" y="0" width="220" height="220" fill="url(%23b)"/><!-- Lighter, more transparent hill --><path d=\"M0,540 Q180,450 400,510 Q600,580 1000,520 L1000,600 L0,600 Z\" fill=\"%239af6b4\" fill-opacity=\"0.50\"/></svg>');
            background-size: cover;
            background-position: bottom center;
            opacity: 1;
        }

        /* --------- Footer styles --------- */
        footer {
            width: 100%;
            text-align: center;
            padding: 1.4em 0 1em 0;
            font-size: 1.05em;
            color: #3b4860;
            letter-spacing: 0.02em;
            background: none;
            z-index: 2;
            position: relative;
            margin-top: 0;
            font-family: 'Inter', Arial, sans-serif;
            font-weight: 600;
        }
        footer small {
            opacity: 0.96;
            font-size: 1em;
            font-weight: 700;
            user-select: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Walletera</h1>
    <p>

            <span class="link-text">Follow me for project updates</span>

    </div>
</div>
<footer>
    <small>
        &copy; 2025 The Walletera Team
    </small>
</footer>
</body>
</html>
